<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="25%" style="stop-color:#ffa502"/>
      <stop offset="50%" style="stop-color:#ff6348"/>
      <stop offset="75%" style="stop-color:#ff4757"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    <linearGradient id="textglow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fff"/>
      <stop offset="100%" style="stop-color:#f0f0f0"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    <filter id="blur3">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Ambient glow orbs -->
  <circle cx="200" cy="300" r="200" fill="#ff6b6b" opacity="0.08" filter="url(#blur1)"/>
  <circle cx="1080" cy="340" r="250" fill="#ffa502" opacity="0.06" filter="url(#blur1)"/>
  <circle cx="640" cy="500" r="180" fill="#ff4757" opacity="0.05" filter="url(#blur1)"/>

  <!-- Grid lines (subtle) -->
  <g opacity="0.04" stroke="#fff" stroke-width="1">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Decorative dots -->
  <g opacity="0.15">
    <circle cx="180" cy="120" r="3" fill="#ff6b6b"/>
    <circle cx="350" cy="80" r="2" fill="#ffa502"/>
    <circle cx="520" cy="150" r="2.5" fill="#ff6348"/>
    <circle cx="760" cy="100" r="2" fill="#ff4757"/>
    <circle cx="950" cy="130" r="3" fill="#ff6b6b"/>
    <circle cx="1100" cy="90" r="2" fill="#ffa502"/>
    <circle cx="200" cy="520" r="2" fill="#ff6348"/>
    <circle cx="400" cy="560" r="3" fill="#ff4757"/>
    <circle cx="880" cy="540" r="2.5" fill="#ff6b6b"/>
    <circle cx="1050" cy="510" r="2" fill="#ffa502"/>
  </g>

  <!-- "nobody" text (large, muted) -->
  <text x="640" y="260" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="120" font-weight="900" letter-spacing="-4" fill="#ffffff" opacity="0.95">
    nobody
  </text>

  <!-- "built" text (large, gradient accent) -->
  <text x="640" y="380" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="120" font-weight="900" letter-spacing="-4" fill="url(#glow)">
    built
  </text>

  <!-- Underline accent -->
  <rect x="390" y="400" width="500" height="4" rx="2" fill="url(#glow)" opacity="0.6"/>

  <!-- Tagline -->
  <text x="640" y="460" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="28" font-weight="400" fill="#ffffff" opacity="0.6" letter-spacing="2">
    find what nobody has built yet
  </text>

  <!-- Bottom badges row -->
  <g transform="translate(640, 540)" text-anchor="middle">
    <!-- Claude Code badge -->
    <rect x="-340" y="-16" width="120" height="32" rx="6" fill="#ffffff" opacity="0.08"/>
    <text x="-280" y="6" font-family="system-ui, sans-serif" font-size="13" fill="#ffffff" opacity="0.5" text-anchor="middle">Claude Code</text>

    <!-- Cursor badge -->
    <rect x="-195" y="-16" width="90" height="32" rx="6" fill="#ffffff" opacity="0.08"/>
    <text x="-150" y="6" font-family="system-ui, sans-serif" font-size="13" fill="#ffffff" opacity="0.5" text-anchor="middle">Cursor</text>

    <!-- Codex badge -->
    <rect x="-80" y="-16" width="80" height="32" rx="6" fill="#ffffff" opacity="0.08"/>
    <text x="-40" y="6" font-family="system-ui, sans-serif" font-size="13" fill="#ffffff" opacity="0.5" text-anchor="middle">Codex</text>

    <!-- Gemini CLI badge -->
    <rect x="25" y="-16" width="110" height="32" rx="6" fill="#ffffff" opacity="0.08"/>
    <text x="80" y="6" font-family="system-ui, sans-serif" font-size="13" fill="#ffffff" opacity="0.5" text-anchor="middle">Gemini CLI</text>

    <!-- OpenClaw badge -->
    <rect x="160" y="-16" width="110" height="32" rx="6" fill="#ffffff" opacity="0.08"/>
    <text x="215" y="6" font-family="system-ui, sans-serif" font-size="13" fill="#ffffff" opacity="0.5" text-anchor="middle">OpenClaw</text>
  </g>

  <!-- Corner accents -->
  <rect x="0" y="0" width="4" height="60" fill="url(#glow)" opacity="0.3"/>
  <rect x="0" y="0" width="60" height="4" fill="url(#glow)" opacity="0.3"/>
  <rect x="1276" y="0" width="4" height="60" fill="url(#glow)" opacity="0.3"/>
  <rect x="1220" y="0" width="60" height="4" fill="url(#glow)" opacity="0.3"/>
  <rect x="0" y="580" width="4" height="60" fill="url(#glow)" opacity="0.3"/>
  <rect x="0" y="636" width="60" height="4" fill="url(#glow)" opacity="0.3"/>
  <rect x="1276" y="580" width="4" height="60" fill="url(#glow)" opacity="0.3"/>
  <rect x="1220" y="636" width="60" height="4" fill="url(#glow)" opacity="0.3"/>
</svg>
